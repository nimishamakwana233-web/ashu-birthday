<!DOCTYPE html>
<html>
<head>
<title>Ashu's Birthday Surprise</title>

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#f3e7ff,#e8d3ff);
overflow-x:hidden;
}

.page{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
animation:fade 1s;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* Loading Page */

#loading{
display:flex;
background:linear-gradient(135deg,#fff0ff,#efe2ff);
}

.bar{
width:220px;
height:12px;
border-radius:20px;
border:2px solid #b46cff;
overflow:hidden;
margin-top:10px;
}

.fill{
height:100%;
width:0;
background:#b46cff;
animation:load 3s forwards;
}

@keyframes load{
to{width:100%;}
}

/* Buttons */

button{
padding:12px 25px;
border:none;
background:#caa6ff;
color:white;
border-radius:30px;
font-size:16px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* Image Card */

.card{
background:white;
padding:20px;
border-radius:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.card img{
width:180px;
border-radius:20px;
}

/* Hearts animation */

.heart{
position:fixed;
color:#ff7ab6;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* Gallery */

.gallery{
display:flex;
flex-direction:column;
gap:35px;
padding:20px;
}

.photo{
background:white;
padding:15px;
border-radius:25px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.photo img{
width:260px;
border-radius:18px;
}

.caption{
margin-top:8px;
color:#666;
font-size:14px;
}

</style>
</head>

<body>

<!-- PAGE 1 LOADING -->

<div id="loading" class="page">

<h1>🎂</h1>
<h3>Loading your birthday surprise...</h3>

<div class="bar">
<div class="fill"></div>
</div>

</div>

<!-- PAGE 2 CUTIEPIE -->

<div id="page2" class="page">

<div class="card">

<img src="ashu.jpg.png">

<h2>A Cutiepie was born today 💜</h2>

<p>21 years ago...</p>

<p>And somehow he became my whole world ✨</p>

<button onclick="nextPage(3)">Start the Surprise 🎁</button>

</div>

</div>

<!-- PAGE 3 BIRTHDAY -->

<div id="page3" class="page">

<h1>Happy Birthday Baby 💕</h1>

<p>You make my world brighter everyday.</p>

<button onclick="nextPage(4)">Click Me</button>

</div>

<!-- PAGE 4 GALLERY -->

<div id="page4" class="page">

<h2>My Favourite Person 💗</h2>

<div class="gallery">

<div class="photo">
<img src="photo1.jpg">
<div class="caption">My safe place 🫶</div>
</div>

<div class="photo">
<img src="photo2.jpg">
<div class="caption">My biggest blessing 💗</div>
</div>

<div class="photo">
<img src="photo3.jpg">
<div class="caption">My forever headache but favourite one 😌</div>
</div>

</div>

</div>

<script>

/* Loading to page2 */

document.getElementById("loading").style.display="flex";

setTimeout(()=>{
document.getElementById("loading").style.display="none";
document.getElementById("page2").style.display="flex";
},3000);

/* Page Switch */

function nextPage(num){
document.querySelectorAll(".page").forEach(p=>p.style.display="none");
document.getElementById("page"+num).style.display="flex";
}

/* Floating Hearts */

setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💜";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(15+Math.random()*20)+"px";
document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

},800);

</script>

</body>
  </html>
