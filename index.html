<!DOCTYPE html>
<html>
<head>
<title>Ashu Birthday</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
text-align:center;
}

/* LOADING SCREEN */

#loading{
position:fixed;
width:100%;
height:100%;
background:#e6d6ff;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
color:#4b2e83;
}

/* PAGE STYLE */

.page{
display:none;
min-height:100vh;
padding:30px;
}

/* LAVENDER BACKGROUND */

.lavender{
background:linear-gradient(135deg,#e6d6ff,#f3e8ff,#e0c3fc);
color:#4b2e83;
}

/* CUTIE CARD */

.card{
background:white;
padding:25px;
border-radius:20px;
max-width:350px;
margin:auto;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.card img{
width:120px;
margin-bottom:15px;
}

/* BUTTON */

button{
background:#d8b4fe;
border:none;
padding:12px 25px;
border-radius:25px;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

/* PHOTO GALLERY */

.gallery{
max-width:400px;
margin:auto;
}

.photo-card{
background:white;
padding:15px;
border-radius:20px;
margin:25px 0;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.photo-card img{
width:100%;
border-radius:20px;
}

.caption{
margin-top:10px;
font-size:16px;
color:#555;
}

</style>
</head>

<body>

<!-- LOADING PAGE -->

<div id="loading">
Loading surprise...
</div>

<!-- CUTIEPIE PAGE -->

<div id="page1" class="page lavender">

<div class="card">

<img src="ashu.jpg.png">

<h2>A Cutiepie was born today,<br>21 years ago!</h2>

<p>Yes, it's YOU! A little surprise awaits...</p>

<button onclick="showGallery()">Start the surprise 🎁</button>

</div>

</div>

<!-- PHOTO PAGE -->

<div id="page2" class="page lavender">

<h1>My Favourite Person 💞</h1>

<div class="gallery">

<div class="photo-card">
<img src="photo1.jpg">
<div class="caption">My safe place 🫂</div>
</div>

<div class="photo-card">
<img src="photo2.jpg">
<div class="caption">My biggest blessing 💖</div>
</div>

<div class="photo-card">
<img src="photo3.jpg">
<div class="caption">My forever headache but favourite one 😌</div>
</div>

</div>

</div>

<script>

/* LOADING TIMER */

setTimeout(function(){
document.getElementById("loading").style.display="none";
document.getElementById("page1").style.display="block";
},2000);

/* BUTTON FUNCTION */

function showGallery(){
document.getElementById("page1").style.display="none";
document.getElementById("page2").style.display="block";
}

</script>

</body>
</html>
